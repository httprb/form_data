name: Mutant

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  BUNDLE_WITHOUT: "sig"

jobs:
  mutant:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby-3.4
          bundler-cache: true

      - name: bundle exec mutant run
        run: bundle exec mutant run
